# Deploy automatico su S3 + CloudFront.
#
# Si attiva a ogni push su main (incluse le modifiche fatte con la
# matita su GitHub.com, es. blog-posts.json o plans.json) e può essere
# lanciato a mano dalla tab Actions (workflow_dispatch).
#
# Richiede questi Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — utente IAM dedicato al deploy
#   AWS_REGION                 — es. eu-south-1
#   S3_BUCKET                  — nome del bucket (senza s3://)
#   CLOUDFRONT_DISTRIBUTION_ID — es. E1ABC23DEF456

name: Deploy su S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura credenziali AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Asset (CSS, JS, immagini): cache di un giorno nel browser.
      # HTML e JSON vengono ricaricati al passo successivo con no-cache,
      # così notizie e prezzi nuovi sono visibili subito.
      - name: Sync dei file sul bucket
        run: |
          aws s3 sync . "s3://${{ secrets.S3_BUCKET }}" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --cache-control "public, max-age=86400" \
            --delete

      - name: HTML e JSON senza cache
        run: |
          aws s3 cp . "s3://${{ secrets.S3_BUCKET }}" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --cache-control "no-cache"

      - name: Invalidazione della cache CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
